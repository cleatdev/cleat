name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Only need to read the repo. No write access for CI.
permissions:
  contents: read

# Cancel in-progress runs for the same ref, avoid wasting minutes on
# superseded pushes. For main branch, this rarely fires.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Static analysis: shellcheck (advisory, does not block merge) ─────────
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint bin/cleat (errors only)
        run: shellcheck --severity=error --shell=bash bin/cleat
      - name: Lint docker/entrypoint.sh (errors only)
        run: shellcheck --severity=error --shell=bash docker/entrypoint.sh
      - name: Lint install.sh (errors only)
        run: shellcheck --severity=error --shell=bash install.sh

  # ── Full test suite on Linux ──────────────────────────────────────────────
  # Suite and mutation output goes to a file, then cat. The runner holds a step
  # open until every process sharing its output pipe exits, so a single test
  # straggler (a backgrounded watcher losing a kill race) used to stall the
  # step for minutes after the suite passed; a 2026-07-14 run blew the job
  # timeout that way with the suite green. A straggler holding a plain file
  # blocks nobody. Costs live streaming, buys deterministic step exit.
  test-linux:
    name: test (ubuntu, bash 5.x)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install inotify-tools (exercise the inotifywait watcher branch)
        # The Linux leg runs the suite with inotifywait present so the event
        # branch of _clipboard_watcher is really executed; the macOS leg has
        # neither inotifywait nor fswatch and keeps covering the polling
        # fallback. Together the matrix exercises both watch paths.
        run: sudo apt-get update && sudo apt-get install -y inotify-tools
      - name: Bash version
        run: bash --version
      - name: Run full BATS suite
        run: |
          rc=0; ./test.sh > "$RUNNER_TEMP/suite.log" 2>&1 < /dev/null || rc=$?
          cat "$RUNNER_TEMP/suite.log"; exit "$rc"
      - name: Mutation test the regression registry
        run: |
          rc=0; ./test/mutation_regressions.sh > "$RUNNER_TEMP/mutation.log" 2>&1 < /dev/null || rc=$?
          cat "$RUNNER_TEMP/mutation.log"; exit "$rc"

  # ── Full test suite on macOS via /bin/bash (bash 3.2, catches bash 4+ bugs) ─
  # macOS ships both /bin/bash (Apple's 3.2.57, unchanged since 2009 due to the
  # bash 4 GPLv3 switch) and Homebrew bash 5. We run the suite through /bin/bash
  # explicitly so we're actually testing the version real macOS users have as
  # default. Bash 3.2 compatibility is a hard project invariant.
  #
  # Pinned to macos-15 (not macos-latest) on purpose. GitHub is migrating the
  # `macos-latest` label to macOS 26 over Jun 15–Jul 15 2026, gradually, so the
  # `latest` label would run this canary on a mix of OS images during the
  # rollout. Pinning keeps the bash-3.2 canary deterministic; macos-15 is
  # supported for ~a year. Revisit (bump to macos-26 or back to latest) once the
  # migration settles. The 3.2.x assertion below is the backstop either way.
  test-macos-bash32:
    name: test (macos, bash 3.2)
    runs-on: macos-15
    # 30, not 20: on 2026-07-14 a run was cancelled with the suite green and the
    # mutation harness mid-flight. Suite (~10 min on the macOS runner) plus the
    # 290-entry harness (~10 min) had outgrown 20; v1.2.2's run finished 19s
    # under the wire. File-redirected steps (see test-linux) reclaim the
    # straggler dead-air too.
    timeout-minutes: 30
    defaults:
      run:
        shell: /bin/bash --noprofile --norc -eo pipefail {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Bash version (must be 3.2)
        run: |
          bash --version
          /bin/bash --version
          /bin/bash -c 'echo "BASH_VERSION=$BASH_VERSION"' | grep -E '^BASH_VERSION=3\.2\.' \
            || { echo "Expected /bin/bash to be 3.2.x"; exit 1; }
      - name: Diagnostic, verify cleat binary runs on bash 3.2
        run: |
          export HOME=/tmp/cleat-diag
          export XDG_CONFIG_HOME=/tmp/cleat-diag-xdg
          mkdir -p "$HOME/.claude" "$XDG_CONFIG_HOME/cleat"
          export PATH="$(pwd)/test/fixtures/mock_bin:$PATH"
          export DOCKER_CALLS=/tmp/docker_calls DOCKER_MOCK_DIR=/tmp/docker_mock
          touch "$DOCKER_CALLS"; mkdir -p "$DOCKER_MOCK_DIR"
          echo "=== cleat --help ==="
          /bin/bash bin/cleat --help 2>&1 | head -5 || echo "EXIT: $?"
          echo "=== cleat config --enable git ==="
          /bin/bash bin/cleat config --enable git 2>&1 || echo "EXIT: $?"
          echo "=== cleat config --enable git (trace last 20) ==="
          /bin/bash -x bin/cleat config --enable git 2>&1 | tail -20 || echo "EXIT: $?"
          echo "=== which timeout ==="
          which timeout 2>&1 || echo "timeout not found"
          echo "=== locale ==="
          locale 2>&1 || true
      - name: Run full BATS suite via /bin/bash
        run: |
          rc=0; /bin/bash ./test.sh > "$RUNNER_TEMP/suite.log" 2>&1 < /dev/null || rc=$?
          cat "$RUNNER_TEMP/suite.log"; exit "$rc"
      - name: Mutation test the regression registry via /bin/bash
        run: |
          rc=0; /bin/bash ./test/mutation_regressions.sh > "$RUNNER_TEMP/mutation.log" 2>&1 < /dev/null || rc=$?
          cat "$RUNNER_TEMP/mutation.log"; exit "$rc"

  # ── Integration tests against real Docker (Linux only, runners have it) ──
  test-integration:
    name: integration (real docker)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test-linux
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Verify docker available
        run: docker version
      - name: Run integration suite
        run: ./test/integration/run.sh
