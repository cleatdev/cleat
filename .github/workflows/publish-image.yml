name: publish-image

# Build and push Docker image to ghcr.io on every semver tag.
# The CLI's `cleat start` pulls this image instead of building locally.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cleatdev/cleat

jobs:
  publish:
    name: build & push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            -f docker/Dockerfile \
            -t "$REGISTRY/$IMAGE_NAME:latest" \
            -t "$REGISTRY/$IMAGE_NAME:${{ steps.meta.outputs.tag }}" \
            --label "sh.cleat.version=${{ steps.meta.outputs.version }}" \
            --label "org.opencontainers.image.source=https://github.com/cleatdev/cleat" \
            docker/

      - name: Push image
        run: |
          docker push "$REGISTRY/$IMAGE_NAME:latest"
          docker push "$REGISTRY/$IMAGE_NAME:${{ steps.meta.outputs.tag }}"
